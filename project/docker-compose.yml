version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: shop_db
    environment:
      POSTGRES_DB: shop_db
      POSTGRES_USER: shop_user
      POSTGRES_PASSWORD: shop_password_prod_secure
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shop_user -d shop_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: shop_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: shop_backend
    environment:
      - DEBUG=False
      - SECRET_KEY=prod-secret-key-ecommerce-platform-unique-antigravity
      - DATABASE_URL=postgres://shop_user:shop_password_prod_secure@postgres:5432/shop_db
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - ALLOWED_HOSTS=localhost,127.0.0.1,backend
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - django_static:/app/django-static
      - django_media:/app/media

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: shop_celery_worker
    command: celery -A ecommerce worker -l info
    environment:
      - DEBUG=False
      - SECRET_KEY=prod-secret-key-ecommerce-platform-unique-antigravity
      - DATABASE_URL=postgres://shop_user:shop_password_prod_secure@postgres:5432/shop_db
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      - redis
      - postgres

  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: shop_celery_beat
    command: celery -A ecommerce beat -l info
    environment:
      - DEBUG=False
      - SECRET_KEY=prod-secret-key-ecommerce-platform-unique-antigravity
      - DATABASE_URL=postgres://shop_user:shop_password_prod_secure@postgres:5432/shop_db
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      - redis
      - postgres

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: shop_frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  django_static:
  django_media:
