{% extends "admin/base_site.html" %}
{% load i18n %}

{% block content %}
  <div class="app-shop module">
    <h1>{{ title }}</h1>

    <div class="card">
      <div class="card-body">
        <p>Shop: <strong>{{ shop.name }}</strong></p>
        <p>Owner: <strong>{{ owner.username }}</strong> ({{ owner.email }})</p>

        <form method="post" style="margin-top:1rem;">
          {% csrf_token %}
          <div>
            <label for="id_new_password">New password:</label><br />
            <input type="password" name="new_password" id="id_new_password" class="vTextField" />
          </div>
          <div style="margin-top:1rem;">
            <button type="submit" class="default">Set password</button>
            <a href="{{ request.META.HTTP_REFERER|default:'#' }}" class="button">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
{% endblock %}
